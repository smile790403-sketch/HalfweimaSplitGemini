<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大地分帳 V11 旗艦版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sage: #4f6d5a; --earth: #8c7b6c; --beige: #f5f5dc; --dark: #2d4a3e; --terracotta: #b66a50; }
        body { background-color: var(--beige); font-family: sans-serif; padding-bottom: 90px; }
        .app-header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index:1000; cursor: pointer; }
        .nav-bottom { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; flex:1; cursor: pointer; }
        .nav-item.active { color: var(--sage); font-weight: bold; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; padding: 15px; }
        .btn-earth { background: var(--sage); color: white; border-radius: 10px; width: 100%; padding: 10px; font-weight: bold; border: none; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .badge-mem { background: #eee; padding: 5px 10px; border-radius: 20px; margin: 2px; display: inline-block; cursor: pointer; font-size: 0.8rem; border: 1px solid transparent; }
        .badge-mem.active { background: var(--earth); color: white; }
        .edit-btn { cursor: pointer; color: var(--earth); font-weight: bold; }
        .edit-btn:hover { color: var(--terracotta); }
        .table-area { background: white; border-radius: 10px; padding: 10px; overflow-x: auto; font-size: 0.7rem; }
        .filter-input { width: 100%; border: 1px solid #ddd; border-radius: 4px; font-size: 0.65rem; margin-bottom: 5px; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.7); display:none; align-items:center; justify-content:center; z-index:9999; }
        .chart-container { position: relative; margin-bottom: 30px; }
        .pie-center { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="loading" id="loader">同步中...</div>
    <div class="app-header" onclick="fetchData()">🌏 大地分帳 V11 (重整資料)</div>

    <div id="sec-trip" class="section">
        <div class="card">
            <h6 id="t_form_title" class="fw-bold mb-3">✈️ 旅程管理</h6>
            <input type="hidden" id="t_rowIdx">
            <input type="text" id="t_name" class="form-control mb-2" placeholder="旅程名稱">
            <div class="row g-2 mb-2"><div class="col"><input type="date" id="t_start" class="form-control"></div><div class="col"><input type="date" id="t_end" class="form-control"></div></div>
            <input type="text" id="t_members" class="form-control mb-3" placeholder="參與者 (逗號隔開)">
            <button class="btn btn-earth" onclick="saveTrip()">儲存</button>
        </div>
        <div id="trip-list-area"></div>
    </div>

    <div id="sec-ex" class="section">
        <div class="card">
            <h6 id="ex_form_title" class="fw-bold mb-3">💱 換匯紀錄</h6>
            <input type="hidden" id="ex_rowIdx">
            <select id="ex_trip" class="form-select mb-2" onchange="persistTrip(this.value); updateExList();"></select>
            <div class="row g-2 mb-2"><div class="col-6"><input type="date" id="ex_date" class="form-control"></div><div class="col-6"><input type="text" id="ex_loc" class="form-control" placeholder="換匯所"></div></div>
            <div class="row g-2 mb-2">
                <div class="col-4"><input type="text" id="ex_cur" class="form-control" placeholder="幣別" oninput="calcExTwd()"></div>
                <div class="col-8"><input type="number" id="ex_rate" class="form-control" placeholder="匯率 (1外幣=?台幣)" oninput="calcExTwd()" step="any"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="number" id="ex_amt" class="form-control" placeholder="外幣金額" oninput="calcExTwd()"></div>
                <div class="col-6"><input type="text" id="ex_src" class="form-control" placeholder="來源 (如現金)"></div>
            </div>
            <div class="small mb-3">台幣金額: <span id="ex_twd_val_display" class="fw-bold text-danger">0</span></div>
            <button class="btn btn-earth" onclick="saveEx()">儲存並回到空頁面</button>
        </div>
        <div id="ex-list-area" class="table-area"></div>
    </div>

    <div id="sec-exp" class="section">
        <div class="card">
            <h6 id="exp_form_title" class="fw-bold mb-2">📝 支出記帳</h6>
            <input type="hidden" id="e_rowIdx">
            <select id="e_trip" class="form-select mb-2" onchange="persistTrip(this.value); syncExpUI();"></select>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="e_date" class="form-control"></div>
                <div class="col-6"><select id="e_cat" class="form-select"><option>機票</option><option>電信</option><option>交通</option><option>住宿</option><option>飲食(餐)</option><option>零食點心飲料</option><option>玩樂</option><option>明信片</option><option>郵票</option><option>紀念品(禮用品)</option><option>其他</option><option>團費</option><option>紀念品(食品類)</option><option>保險</option><option>治裝</option></select></div>
            </div>
            <input type="text" id="e_item" class="form-control mb-2" placeholder="品項名稱">
            <div class="row g-2 mb-1">
                <div class="col-7"><input type="number" id="e_amt" class="form-control" placeholder="金額" oninput="calcTwd()"></div>
                <div class="col-5"><select id="e_cur" class="form-select" onchange="calcTwd()"></select></div>
            </div>
            <div class="small mb-2">台幣預估: <span id="e_twd_val" class="fw-bold text-danger">0</span></div>
            
            <label class="small fw-bold">誰付錢？</label><div id="p-box" class="mb-2"></div>
            <div id="p-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <label class="small fw-bold">誰分攤？</label><div id="m-box" class="mb-2"></div>
            <select id="e_split_type" class="form-select form-select-sm mb-2" onchange="updateSplitUI()">
                <option value="平分">平分</option><option value="分攤金額">分攤金額</option>
            </select>
            <div id="m-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <button class="btn btn-earth mt-2" onclick="saveExp()">儲存記帳</button>
        </div>
        <div id="exp-list-area" class="table-area"></div>
    </div>

    <div id="sec-ana" class="section">
        <div class="card">
            <select id="ana_trip" class="form-select mb-3" onchange="persistTrip(this.value); renderCharts();"></select>
            
            <p class="small fw-bold text-center">支出類別佔比</p>
            <div class="chart-container">
                <canvas id="anaPie"></canvas>
                <div class="pie-center"><small class="text-muted">總支出</small><br><b id="total-spend-text">0</b></div>
            </div>

            <p class="small fw-bold text-center mt-4">每人總花費 (分攤額)</p>
            <div class="chart-container"><canvas id="personPie"></canvas></div>

            <p class="small fw-bold text-center mt-4">每日支出趨勢 (橫向疊加)</p>
            <div style="height: 400px;"><canvas id="anaBar"></canvas></div>
            
            <hr>
            <div class="d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold">💰 台幣清算 (抵銷後)</h6>
                <button class="btn btn-sm btn-outline-danger" onclick="settleAll()">Settle Up</button>
            </div>
            <div id="settle-list" class="small p-3 bg-light mt-2 rounded"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" id="nav-trip" onclick="showSec('trip')"><div>✈️</div>旅程</div>
        <div class="nav-item" id="nav-ex" onclick="showSec('ex')"><div>💱</div>換匯</div>
        <div class="nav-item" id="nav-exp" onclick="showSec('exp')"><div>📝</div>記帳</div>
        <div class="nav-item" id="nav-ana" onclick="showSec('ana')"><div>📊</div>分析</div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbicmRk00xed3yYDhAnGLXkztKHOQrwPNttZEBTQapLLgrsbz2aD3xEdNJHQil5h2P/exec"; 
        let db = { Trips: [], Exchange: [], Expenses: [] };
        let charts = {};
        let tempSplitData = { p: {}, m: {} }; // 用於暫存輸入中的金額 (3)

        // --- [新增] 旅程記憶與同步功能 ---
function saveSelectedTrip(val) {
    localStorage.setItem('selectedTrip', val);
    // 同步所有分頁的下拉選單
    ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.value = val;
    });
}

// --- [新增] 自動餘額計算邏輯 ---
function handleAutoFill(containerId, totalAmount, inputClass) {
    const inputs = Array.from(document.querySelectorAll(`#${containerId} .${inputClass}`));
    const filled = inputs.filter(i => i.value !== "");
    const empty = inputs.filter(i => i.value === "");

    if (empty.length === 1) { // 當剩下最後一個空格時
        const currentSum = filled.reduce((sum, i) => sum + parseFloat(i.value || 0), 0);
        const remain = Math.max(0, totalAmount - currentSum);
        empty[0].placeholder = Math.round(remain); // 在浮水印顯示預計金額
    }
}

        window.onload = async () => { 
            await fetchData(); 
            showSec(localStorage.getItem('activeTab') || 'trip'); 
        };

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                renderCommonUI();
            } catch (e) { console.error(e); }
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function persistTrip(v) { localStorage.setItem('selectedTrip', v); }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            localStorage.setItem('activeTab', id);
            
            const lastTrip = localStorage.getItem('selectedTrip');
            if(lastTrip) {
                if(document.getElementById('ex_trip')) document.getElementById('ex_trip').value = lastTrip;
                if(document.getElementById('e_trip')) document.getElementById('e_trip').value = lastTrip;
                if(document.getElementById('ana_trip')) document.getElementById('ana_trip').value = lastTrip;
            }

            if(id === 'ex') updateExList();
            if(id === 'exp') syncExpUI();
            if(id === 'ana') renderCharts();
        }

        function renderCommonUI() {
            const options = db.Trips.slice(1).map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = options; });
            updateTripList();
        }

        // --- 1. 旅程頁面 ---
        function updateTripList() {
            document.getElementById('trip-list-area').innerHTML = db.Trips.slice(1).map((r, i) => `
                <div class="card p-2 mb-2 d-flex justify-content-between flex-row align-items-center">
                    <div><b>${r[0]}</b><br><small>${r[1]} ~ ${r[2]}</small></div>
                    <span class="edit-btn" onclick="editTrip(${i+1})">✏️ 編輯</span>
                </div>
            `).join('');
        }
        function editTrip(idx) {
            const r = db.Trips[idx];
            document.getElementById('t_rowIdx').value = idx;
            document.getElementById('t_name').value = r[0];
            document.getElementById('t_start').value = r[1];
            document.getElementById('t_end').value = r[2];
            document.getElementById('t_members').value = r[3];
            window.scrollTo(0,0);
        }
        async function saveTrip() {
            const data = [document.getElementById('t_name').value, document.getElementById('t_start').value, document.getElementById('t_end').value, document.getElementById('t_members').value, "TWD"];
            await postData('Trips', data, document.getElementById('t_rowIdx').value);
            document.getElementById('t_rowIdx').value = ""; document.getElementById('t_name').value = ""; document.getElementById('t_members').value = "";
        }

        // --- 2. 換匯頁面 ---
        function calcExTwd() {
            const rate = parseFloat(document.getElementById('ex_rate').value) || 0;
            const amt = parseFloat(document.getElementById('ex_amt').value) || 0;
            document.getElementById('ex_twd_val_display').innerText = Math.round(rate * amt);
        }
        function updateExList() {
            const trip = document.getElementById('ex_trip').value;
            const filtered = db.Exchange.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == trip);
            document.getElementById('ex-list-area').innerHTML = `<table class="table table-sm"><thead><tr><th>日期</th><th>幣別/匯率</th><th>金額</th><th>台幣</th><th>✏️</th></tr></thead><tbody>` + 
                filtered.map(o => `<tr><td>${o.r[1]}</td><td>${o.r[3]} (${o.r[4]})</td><td>${o.r[5]}</td><td>${o.r[6]}</td><td><span class="edit-btn" onclick="editEx(${o.i})">✏️</span></td></tr>`).join('') + `</tbody></table>`;
        }
        function editEx(idx) {
            const r = db.Exchange[idx];
            document.getElementById('ex_rowIdx').value = idx;
            document.getElementById('ex_date').value = r[1];
            document.getElementById('ex_loc').value = r[2];
            document.getElementById('ex_cur').value = r[3];
            document.getElementById('ex_rate').value = r[4];
            document.getElementById('ex_amt').value = r[5];
            document.getElementById('ex_src').value = r[7];
            calcExTwd(); window.scrollTo(0,0);
        }
        async function saveEx() {
            const data = [document.getElementById('ex_trip').value, document.getElementById('ex_date').value, document.getElementById('ex_loc').value, document.getElementById('ex_cur').value, document.getElementById('ex_rate').value, document.getElementById('ex_amt').value, document.getElementById('ex_twd_val_display').innerText, document.getElementById('ex_src').value];
            await postData('Exchange', data, document.getElementById('ex_rowIdx').value);
            // 恢復空頁面但保留旅程 (1)
            document.getElementById('ex_rowIdx').value = ""; document.getElementById('ex_cur').value = ""; document.getElementById('ex_rate').value = ""; document.getElementById('ex_amt').value = "";
        }

        // --- 3. 記帳頁面 ---
        function syncExpUI() {
            const tripName = document.getElementById('e_trip').value;
            const trip = db.Trips.find(r => r[0] == tripName);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            const badge = (cls) => mems.map(m => `<span class="badge-mem ${cls}" onclick="handleBadge(this, '${cls}')">${m}</span>`).join('');
            document.getElementById('p-box').innerHTML = badge('p-b');
            document.getElementById('m-box').innerHTML = badge('m-b');
            
            let curs = ["TWD"]; 
            db.Exchange.slice(1).forEach(r => { if(r[0] == tripName) curs.push(r[3]); });
            document.getElementById('e_cur').innerHTML = [...new Set(curs)].map(c => `<option value="${c}">${c}</option>`).join('');
            updateExpList();
        }

        function handleBadge(el, cls) { 
            el.classList.toggle('active'); 
            updateSplitUI(); 
        }

        function updateSplitUI() {
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);
            const type = document.getElementById('e_split_type').value;

            const renderDetails = (targetId, names, tempKey) => {
                const box = document.getElementById(targetId);
                if(names.length > 1 || (targetId === 'm-details' && type === '分攤金額' && names.length > 0)) {
                    box.innerHTML = names.map(n => `
                        <div class="input-group input-group-sm mb-1">
                            <span class="input-group-text">${n}</span>
                            <input type="number" class="form-control ${tempKey}-val" data-mem="${n}" value="${tempSplitData[tempKey][n] || ''}" oninput="tempSplitData['${tempKey}']['${n}'] = this.value">
                        </div>
                    `).join('');
                    box.style.display = 'block';
                } else { box.style.display = 'none'; }
            };

            renderDetails('p-details', ps, 'p');
            renderDetails('m-details', ms, 'm');
        }

        function calcTwd() {
            const cur = document.getElementById('e_cur').value;
            const amt = parseFloat(document.getElementById('e_amt').value) || 0;
            if(cur === "TWD") { document.getElementById('e_twd_val').innerText = amt; }
            else {
                const ex = db.Exchange.slice(1).reverse().find(r => r[0] == document.getElementById('e_trip').value && r[3] == cur);
                document.getElementById('e_twd_val').innerText = ex ? Math.round(amt * ex[4]) : "無匯率";
            }
        }

        function updateExpList() {
            const trip = document.getElementById('e_trip').value;
            const data = db.Expenses.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == trip);
            let h = `<table class="table table-sm" id="expTable"><thead><tr>
                <th><input class="filter-input" placeholder="日期" onkeyup="filterTable(0,this)"></th>
                <th><input class="filter-input" placeholder="類別" onkeyup="filterTable(1,this)"></th>
                <th>台幣</th><th>付款者</th><th>參與者</th><th>✏️</th></tr></thead><tbody>`;
            h += data.map(o => `<tr><td>${o.r[1]}</td><td>${o.r[2]}</td><td>${o.r[6]}</td><td>${o.r[7]}</td><td>${o.r[8]}</td><td><span class="edit-btn" onclick="editExp(${o.i})">✏️</span></td></tr>`).join('') + `</tbody></table>`;
            document.getElementById('exp-list-area').innerHTML = h;
        }

        function filterTable(idx, el) {
            const v = el.value.toLowerCase();
            document.querySelectorAll("#expTable tbody tr").forEach(r => r.style.display = r.cells[idx].innerText.toLowerCase().includes(v) ? "" : "none");
        }

        function editExp(idx) {
            const r = db.Expenses[idx];
            document.getElementById('e_rowIdx').value = idx;
            document.getElementById('e_date').value = r[1];
            document.getElementById('e_cat').value = r[2];
            document.getElementById('e_item').value = r[3];
            document.getElementById('e_amt').value = r[4];
            document.getElementById('e_cur').value = r[5];
            
            // 恢復付款/參與者狀態 (3)
            const ps = r[7].split(','); const ms = r[8].split(',');
            tempSplitData = { p: {}, m: {} };
            if(r[11].includes('[P:')) {
                r[11].match(/\[P:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); tempSplitData.p[n]=v; });
            }
            if(r[11].includes('[M:')) {
                r[11].match(/\[M:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); tempSplitData.m[n]=v; });
            }
            
            calcTwd(); syncExpUI(); 
            // 根據數據勾選 Badge
            setTimeout(() => {
                document.querySelectorAll('.p-b').forEach(b => { if(ps.includes(b.innerText)) b.classList.add('active'); });
                document.querySelectorAll('.m-b').forEach(b => { if(ms.includes(b.innerText)) b.classList.add('active'); });
                document.getElementById('e_split_type').value = r[9];
                updateSplitUI();
            }, 100);
            window.scrollTo(0,0);
        }

        async function saveExp() {
            const pStr = Object.entries(tempSplitData.p).map(([n,v]) => `${n}:${v}`).join('|');
            const mStr = Object.entries(tempSplitData.m).map(([n,v]) => `${n}:${v}`).join('|');
            const data = [
                document.getElementById('e_trip').value, document.getElementById('e_date').value, document.getElementById('e_cat').value, document.getElementById('e_item').value, 
                document.getElementById('e_amt').value, document.getElementById('e_cur').value, document.getElementById('e_twd_val').innerText, 
                Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText).join(','), 
                Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText).join(','), 
                document.getElementById('e_split_type').value, "", `[P:${pStr}][M:${mStr}]`
            ];
            await postData('Expenses', data, document.getElementById('e_rowIdx').value);
            // 重設 (1)
            document.getElementById('e_rowIdx').value = ""; document.getElementById('e_item').value = ""; document.getElementById('e_amt').value = "";
            tempSplitData = { p: {}, m: {} };
        }

        // --- 4. 分析與橫向群組柱狀圖 (5, 6) ---
        function renderCharts() {
            const t = document.getElementById('ana_trip').value;
            const allExps = db.Expenses.slice(1).filter(r => r[0] == t);
            const trip = db.Trips.find(r => r[0] == t);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            
            // 總支出圓餅圖
            const cats = {}; let total = 0;
            allExps.forEach(r => { const twd = Number(r[6]); cats[r[2]] = (cats[r[2]] || 0) + twd; total += twd; });
            document.getElementById('total-spend-text').innerText = Math.round(total);
            drawPie('anaPie', Object.keys(cats), Object.values(cats));

            // 每人總花費圓餅圖 (6)
            let personShares = {}; mems.forEach(m => personShares[m] = 0);
            allExps.forEach(r => {
                const twd = Number(r[6]); const ms = r[8].split(',');
                if(r[9] === '分攤金額' && r[11].includes('[M:')) {
                    r[11].match(/\[M:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); if(personShares[n]!==undefined) personShares[n]+=Number(v); });
                } else { ms.forEach(m => { if(personShares[m]!==undefined) personShares[m] += twd/ms.length; }); }
            });
            drawPie('personPie', Object.keys(personShares), Object.values(personShares));

            // 橫向疊加柱狀圖: Y軸為日期, X軸為花費, 每一柱裡面疊加類別 (5)
            const dates = [...new Set(allExps.map(r => r[1]))].sort();
            const catColors = { '飲食(餐)': '#4f6d5a', '交通': '#8c7b6c', '住宿': '#d9c5b2', '玩樂': '#b66a50', '其他': '#2d4a3e' };
            const datasets = [];
            const allCats = [...new Set(allExps.map(r => r[2]))];
            
            allCats.forEach(cat => {
                datasets.push({
                    label: cat,
                    data: dates.map(d => {
                        let sum = 0;
                        allExps.filter(r => r[1] === d && r[2] === cat).forEach(r => sum += Number(r[6]));
                        return sum;
                    }),
                    backgroundColor: catColors[cat] || getRandomColor(),
                    stack: 'Stack 0',
                });
            });

            if(charts.anaBar) charts.anaBar.destroy();
            charts.anaBar = new Chart(document.getElementById('anaBar'), {
                type: 'bar',
                data: { labels: dates, datasets },
                options: { indexAxis: 'y', plugins: { legend: { position: 'bottom' } }, scales: { x: { stacked: true }, y: { stacked: true } } }
            });

            // 清算 (4) - 一律台幣
            let bal = {}; mems.forEach(m => bal[m] = 0);
            allExps.filter(r => r[12] !== "已結清").forEach(r => {
                const twd = Number(r[6]);
                if(r[11].includes('[P:')) {
                    r[11].match(/\[P:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); if(bal[n]!==undefined) bal[n]+=Number(v); });
                } else { bal[r[7]] += twd; }
                if(r[9] === '分攤金額' && r[11].includes('[M:')) {
                    r[11].match(/\[M:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); if(bal[n]!==undefined) bal[n]-=Number(v); });
                } else { r[8].split(',').forEach(m => { if(bal[m]!==undefined) bal[m] -= twd/r[8].split(',').length; }); }
            });

            let debtors = [], creditors = [];
            Object.entries(bal).forEach(([n, b]) => {
                if (b < -1) debtors.push({n, amt: Math.abs(b)});
                else if (b > 1) creditors.push({n, amt: b});
            });

            let sHtml = "";
            while(debtors.length > 0 && creditors.length > 0) {
                let d = debtors[0], c = creditors[0];
                let amt = Math.min(d.amt, c.amt);
                sHtml += `<div class="mb-1"><b>${d.n}</b> ➜ <b>${c.n}</b> : <span class="text-danger">NT$ ${Math.round(amt)}</span></div>`;
                d.amt -= amt; c.amt -= amt;
                if(d.amt <= 1) debtors.shift();
                if(c.amt <= 1) creditors.shift();
            }
            document.getElementById('settle-list').innerHTML = sHtml || "結清完畢！";
        }

        function drawPie(id, labels, data) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#4f6d5a','#8c7b6c','#d9c5b2','#b66a50','#2d4a3e','#e9ecef'] }] }, options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } } });
        }

        async function postData(sheet, data, rowIdx, override = null) {
            toggleLoader(true);
            const method = override || (rowIdx ? "update" : "append");
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({sheet, method, data, rowIdx, tripName: localStorage.getItem('selectedTrip')}) });
            await fetchData();
            toggleLoader(false);
        }
        async function settleAll() { if(confirm("結清會標記目前帳目，但不影響分析圖表。確定？")) await postData('Expenses', [], null, 'settleAll'); }
        function getRandomColor() { return '#' + Math.floor(Math.random()*16777215).toString(16); }
    </script>
</body>
</html>
