<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大地分帳 Pro V7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sage: #4f6d5a; --earth: #8c7b6c; --beige: #f5f5dc; --dark: #2d4a3e; }
        body { background-color: var(--beige); font-family: sans-serif; padding-bottom: 80px; }
        .app-header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index:1000; }
        .nav-bottom { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.75rem; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--sage); font-weight: bold; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; }
        .btn-earth { background: var(--sage); color: white; border-radius: 8px; width: 100%; padding: 10px; font-weight: bold; border: none; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .badge-mem { background: #eee; padding: 5px 10px; border-radius: 20px; margin: 2px; display: inline-block; cursor: pointer; font-size: 0.8rem; }
        .badge-mem.active { background: var(--earth); color: white; }
        .table-area { background: white; border-radius: 10px; padding: 10px; overflow-x: auto; font-size: 0.75rem; }
        .split-input-group { background: #f9f9f9; border-radius: 8px; padding: 10px; margin-top: 10px; display: none; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.7); display:none; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div class="loading" id="loader">處理中...</div>
    <div class="app-header">大地分帳 Pro V7</div>

    <div id="sec-trip" class="section">
        <div class="card p-3">
            <h6 id="trip-form-title">✈️ 旅程設定</h6>
            <input type="hidden" id="t_rowIdx">
            <input type="text" id="t_name" class="form-control mb-2" placeholder="旅程名稱">
            <div class="row g-2 mb-2">
                <div class="col"><input type="date" id="t_start" class="form-control"></div>
                <div class="col"><input type="date" id="t_end" class="form-control"></div>
            </div>
            <input type="text" id="t_members" class="form-control mb-2" placeholder="參與者 (逗號隔開)">
            <input type="text" id="t_base" class="form-control mb-2" value="TWD" placeholder="基準幣別">
            <button class="btn btn-earth" onclick="saveTrip()">儲存</button>
        </div>
        <div id="trip-list-area"></div>
    </div>

    <div id="sec-ex" class="section">
        <div class="card p-3">
            <h6 id="ex-form-title">💱 換匯紀錄</h6>
            <input type="hidden" id="ex_rowIdx">
            <select id="ex_trip" class="form-select mb-2" onchange="saveLastTrip(this.value)"></select>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="ex_date" class="form-control"></div>
                <div class="col-6"><input type="text" id="ex_loc" class="form-control" placeholder="換匯所"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-4"><input type="text" id="ex_cur" class="form-control" placeholder="幣別" oninput="calcExTwd()"></div>
                <div class="col-8"><input type="number" id="ex_rate" class="form-control" placeholder="匯率 (1外幣=?台幣)" oninput="calcExTwd()" step="0.0001"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="number" id="ex_amt" class="form-control" placeholder="外幣金額" oninput="calcExTwd()"></div>
                <div class="col-6"><input type="text" id="ex_src" class="form-control" placeholder="來源"></div>
            </div>
            <div class="small text-muted mb-2">換算台幣: <span id="ex_twd_val" class="fw-bold text-danger">0</span></div>
            <input type="text" id="ex_note" class="form-control mb-3" placeholder="備註">
            <button class="btn btn-earth" onclick="saveEx()">儲存紀錄</button>
        </div>
        <div id="ex-list-area" class="table-area"></div>
    </div>

    <div id="sec-exp" class="section">
        <div class="card p-3">
            <h6 id="exp-form-title">📝 記帳支出</h6>
            <input type="hidden" id="e_rowIdx">
            <select id="e_trip" class="form-select mb-2" onchange="saveLastTrip(this.value); syncExpUI();"></select>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="e_date" class="form-control"></div>
                <div class="col-6">
                    <select id="e_cat" class="form-select">
                        <option>機票</option><option>電信</option><option>交通</option><option>住宿</option><option>飲食(餐)</option>
                        <option>零食點心飲料</option><option>玩樂</option><option>明信片</option><option>郵票</option>
                        <option>紀念品(禮用品)</option><option>其他</option><option>團費</option><option>紀念品(食品類)</option>
                        <option>保險</option><option>治裝</option>
                    </select>
                </div>
            </div>
            <input type="text" id="e_item" class="form-control mb-2" placeholder="品項名稱">
            <div class="row g-2 mb-2">
                <div class="col-7"><input type="number" id="e_amt" class="form-control" placeholder="金額" oninput="calcTwd()"></div>
                <div class="col-5"><select id="e_cur" class="form-select" onchange="calcTwd()"></select></div>
            </div>
            <div class="small text-muted mb-2">台幣預估: <span id="e_twd" class="fw-bold">0</span></div>
            
            <div class="small fw-bold mb-1">付款人:</div>
            <div id="p-box" class="mb-1"></div>
            
            <div class="small fw-bold mb-1">參與人 (多選):</div>
            <div id="m-box" class="mb-2"></div>
            
            <div class="row g-2 mb-2">
                <div class="col-6"><select id="e_split" class="form-select" onchange="toggleSplitInputs()"><option value="平分">平分</option><option value="分攤金額">分攤金額</option><option value="比例">比例</option></select></div>
                <div class="col-6"><select id="e_method" class="form-select"><option>現金</option><option>維信用卡</option><option>馬信用卡</option><option>電子支付</option><option>轉帳</option></select></div>
            </div>

            <div id="split-inputs" class="split-input-group"></div>

            <input type="text" id="e_note" class="form-control mt-2 mb-3" placeholder="備註">
            <button class="btn btn-earth" onclick="saveExp()">儲存記帳</button>
        </div>
        <div id="exp-list-area" class="table-area"></div>
    </div>

    <div id="sec-ana" class="section">
        <div class="card p-3">
            <select id="ana_trip" class="form-select mb-3" onchange="saveLastTrip(this.value); renderCharts();"></select>
            <div class="mb-4"><h6>支出類別分佈</h6><canvas id="anaPie"></canvas></div>
            <div class="mb-4"><h6>每日每人花費</h6><canvas id="anaBar"></canvas></div>
            <hr>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">💡 清算結果</h6>
                <button class="btn btn-sm btn-danger" onclick="confirmSettle()">Settle Up (結清)</button>
            </div>
            <div id="settle-list" class="small p-2 bg-light rounded"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" id="nav-trip" onclick="showSec('trip')"><div>✈️</div>旅程</div>
        <div class="nav-item" id="nav-ex" onclick="showSec('ex')"><div>💱</div>換匯</div>
        <div class="nav-item" id="nav-exp" onclick="showSec('exp')"><div>📝</div>記帳</div>
        <div class="nav-item" id="nav-ana" onclick="showSec('ana')"><div>📊</div>分析</div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbicmRk00xed3yYDhAnGLXkztKHOQrwPNttZEBTQapLLgrsbz2aD3xEdNJHQil5h2P/exec"; 
        let db = { Trips: [], Exchange: [], Expenses: [] };
        let charts = {};

        window.onload = async () => {
            await fetchData();
            // 讀取上次停留的頁面與旅程
            const lastTab = localStorage.getItem('activeTab') || 'trip';
            const lastTrip = localStorage.getItem('selectedTrip');
            if(lastTrip) {
                document.getElementById('ex_trip').value = lastTrip;
                document.getElementById('e_trip').value = lastTrip;
                document.getElementById('ana_trip').value = lastTrip;
            }
            showSec(lastTab);
        };

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                renderAll();
            } catch (e) { alert("讀取失敗"); }
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function saveLastTrip(val) { localStorage.setItem('selectedTrip', val); }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            localStorage.setItem('activeTab', id);
            if(id === 'exp') syncExpUI();
            if(id === 'ex') updateExList();
            if(id === 'ana') renderCharts();
        }

        function renderAll() {
            const trips = db.Trips.slice(1);
            const options = trips.map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => document.getElementById(id).innerHTML = options);
            updateTripList();
        }

        // --- 換匯邏輯 ---
        function calcExTwd() {
            const r = document.getElementById('ex_rate').value;
            const a = document.getElementById('ex_amt').value;
            document.getElementById('ex_twd_val').innerText = (r && a) ? Math.round(r * a) : 0;
        }
        function updateExList() {
            const curTrip = document.getElementById('ex_trip').value;
            const filtered = db.Exchange.slice(1).map((r, i) => ({r, i: i+1})).filter(obj => obj.r[0] == curTrip);
            let h = `<table class="table table-sm"><thead><tr class="text-muted"><th>日期</th><th>幣別</th><th>匯率</th><th>台幣</th><th>✏️</th></tr></thead><tbody>`;
            filtered.forEach(obj => {
                h += `<tr><td>${obj.r[1]}</td><td>${obj.r[3]}</td><td>${obj.r[4]}</td><td>${obj.r[6]}</td>
                      <td><span onclick="editEx(${obj.i})">✏️</span></td></tr>`;
            });
            document.getElementById('ex-list-area').innerHTML = h + "</tbody></table>";
        }
        // ... (editEx, saveEx 邏輯與之前類似，但包含新欄位)
        /** * 將 Expenses 分頁的選定行資料填入編輯表單
 * @param {number} idx - 資料在 db.Expenses 中的索引（包含標題列，與 rowIdx 概念一致） */
function editExp(idx) {
    toggleLoader(true); // 顯示處理中遮罩
    try {
        const r = db.Expenses[idx]; // 取得該行原始資料陣列
        if (!r) throw new Error("找不到該筆資料"); // 防錯檢查

        // 0. 儲存隱藏的行索引，供儲存時判斷是更新還是新增
        document.getElementById('e_rowIdx').value = idx; //

        // 1. 旅程名稱 (Index 0 - 欄位 A)
        document.getElementById('e_trip').value = r[0]; //

        // 2. 日期 (Index 1 - 欄位 B)
        document.getElementById('e_date').value = r[1]; //

        // 3. 類別 (Index 2 - 欄位 C)
        document.getElementById('e_cat').value = r[2]; //

        // 4. 項目 (Index 3 - 欄位 D)
        document.getElementById('e_item').value = r[3]; //

        // 5. 外幣金額 (Index 4 - 欄位 E)
        document.getElementById('e_amt').value = r[4]; //

        // 6. 幣別 (Index 5 - 欄位 F)
        document.getElementById('e_cur').value = r[5]; //

        // 7. 台幣金額顯示 (Index 6 - 欄位 G)
        document.getElementById('e_twd_val').innerText = r[6]; //

        // 8. 付款者多選狀態 (Index 7 - 欄位 H)
        // 原始資料為逗號分隔字串 (例: "Eva, Well")，需先轉為陣列
        const payers = r[7] ? r[7].split(',').map(m => m.trim()) : []; //
        // 遍歷 id="payer-list" 下的所有多選框
        document.querySelectorAll('#payer-list .form-check-input').forEach(c => {
            // 如果多選框的 value 在付款者陣列中，則勾選
            c.checked = payers.includes(c.value); //
        });

        // 9. 參與者多選狀態 (Index 8 - 欄位 I)
        const participants = r[8] ? r[8].split(',').map(m => m.trim()) : []; //
        document.querySelectorAll('#partic-list .form-check-input').forEach(c => {
            c.checked = participants.includes(c.value); //
        });

        // 10. 分帳方式 (Index 9 - 欄位 J)
        document.getElementById('e_split').value = r[9]; //

        // 11. 付款方式 (Index 10 - 欄位 K)
        document.getElementById('e_method').value = r[10]; //

        // 12. 備註 (Index 11 - 欄位 L)
        document.getElementById('e_note').value = r[11]; //

        // UI 調整
        // 更改表單標題為「編輯」
        document.getElementById('exp-form-title').innerText = "✏️ 編輯記帳"; //
        // 自動捲動到頁面最上方，以便看到表單
        window.scrollTo(0, 0); //

    } catch (error) {
        console.error("載入編輯資料失敗:", error); //
        alert("載入資料編輯失敗。"); //
    }
    toggleLoader(false); // 隱藏處理中遮罩
}
        // --- 記帳邏輯 (關鍵更新) ---
        function syncExpUI() {
            updateCurDropdown();
            syncMembers();
            updateExpList();
        }
        function toggleSplitInputs() {
            const type = document.getElementById('e_split').value;
            const area = document.getElementById('split-inputs');
            if (type === '平分') { area.style.display = 'none'; return; }
            
            const activeMems = Array.from(document.querySelectorAll('.m-b.active')).map(b => b.innerText);
            area.innerHTML = `<h6>輸入各別${type}</h6>` + activeMems.map(m => `
                <div class="input-group input-group-sm mb-1">
                    <span class="input-group-text" style="width:80px">${m}</span>
                    <input type="number" class="form-control split-val" data-mem="${m}" placeholder="${type === '比例' ? '%' : '$'}">
                </div>
            `).join('');
            area.style.display = 'block';
        }
        function updateExpList() {
            const curTrip = document.getElementById('e_trip').value;
            const data = db.Expenses.slice(1).map((r, i) => ({r, i: i+1})).filter(obj => obj.r[0] == curTrip);
            let h = `<table class="table table-sm" id="expTable"><thead><tr class="text-muted">
                <th>日期</th><th>項目</th><th>金額</th><th>付款者</th><th>✏️</th></tr></thead><tbody>`;
            data.forEach(obj => {
                const isSettled = obj.r[12] === "已結清";
                h += `<tr class="${isSettled?'table-success':''}"><td>${obj.r[1]}</td><td>${obj.r[3]}</td><td>${obj.r[6]}</td><td>${obj.r[7]}</td>
                      <td><span onclick="editExp(${obj.i})">✏️</span></td></tr>`;
            });
            document.getElementById('exp-list-area').innerHTML = h + "</tbody></table>";
        }

        // --- 清算與結清 ---
        function confirmSettle() {
            if(!confirm("確定要將此旅程目前所有帳目設為「已結清」嗎？(結清後分析圖表將歸零)")) return;
            postData('Expenses', [], null, 'settleAll');
        }

        async function postData(sheet, data, rowIdx, customMethod = null) {
            toggleLoader(true);
            const method = customMethod || (rowIdx ? "update" : "append");
            const tripName = document.getElementById('e_trip').value;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({sheet, method, data, rowIdx, tripName}) });
            await fetchData(); // 重新抓取資料
            toggleLoader(false);
        }

        // 這裡省略了重複的 edit/save 基礎函數，結構同 V6，但欄位需對應新表格順序
    </script>
</body>
</html>
