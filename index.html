<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大地分帳 V9 穩定版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sage: #4f6d5a; --earth: #8c7b6c; --beige: #f5f5dc; --dark: #2d4a3e; }
        body { background-color: var(--beige); font-family: sans-serif; padding-bottom: 90px; }
        .app-header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index:1000; }
        .nav-bottom { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; flex:1; cursor: pointer; }
        .nav-item.active { color: var(--sage); font-weight: bold; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; padding: 15px; }
        .btn-earth { background: var(--sage); color: white; border-radius: 10px; width: 100%; padding: 10px; font-weight: bold; border: none; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .badge-mem { background: #eee; padding: 5px 10px; border-radius: 20px; margin: 2px; display: inline-block; cursor: pointer; font-size: 0.8rem; border: 1px solid transparent; }
        .badge-mem.active { background: var(--earth); color: white; }
        .table-area { background: white; border-radius: 10px; padding: 10px; overflow-x: auto; font-size: 0.7rem; }
        .filter-input { width: 100%; border: 1px solid #ddd; border-radius: 4px; font-size: 0.65rem; margin-bottom: 5px; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.7); display:none; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div class="loading" id="loader">同步中...</div>
    <div class="app-header" onclick="fetchData()">大地分帳 Pro V9 (點此重整)</div>

    <div id="sec-trip" class="section">
        <div class="card">
            <h6 id="t-title">✈️ 旅程設定</h6>
            <input type="hidden" id="t_rowIdx">
            <input type="text" id="t_name" class="form-control mb-2" placeholder="旅程名稱">
            <div class="row g-2 mb-2"><div class="col"><input type="date" id="t_start" class="form-control"></div><div class="col"><input type="date" id="t_end" class="form-control"></div></div>
            <input type="text" id="t_members" class="form-control mb-2" placeholder="參與者 (逗號隔開)">
            <input type="text" id="t_base" class="form-control mb-2" value="TWD">
            <button class="btn btn-earth" onclick="saveTrip()">儲存</button>
        </div>
        <div id="trip-list-area"></div>
    </div>

    <div id="sec-ex" class="section">
        <div class="card">
            <h6 id="ex-title">💱 換匯紀錄</h6>
            <input type="hidden" id="ex_rowIdx">
            <select id="ex_trip" class="form-select mb-2" onchange="persistTrip(this.value); updateExList();"></select>
            <div class="row g-2 mb-2"><div class="col-6"><input type="date" id="ex_date" class="form-control"></div><div class="col-6"><input type="text" id="ex_loc" class="form-control" placeholder="換匯所"></div></div>
            <div class="row g-2 mb-2"><div class="col-4"><input type="text" id="ex_cur" class="form-control" placeholder="幣別" oninput="calcExTwd()"></div><div class="col-8"><input type="number" id="ex_rate" class="form-control" placeholder="匯率" oninput="calcExTwd()"></div></div>
            <div class="row g-2 mb-2"><div class="col-6"><input type="number" id="ex_amt" class="form-control" placeholder="金額" oninput="calcExTwd()"></div><div class="col-6"><input type="text" id="ex_src" class="form-control" placeholder="來源"></div></div>
            <div class="small mb-3">台幣: <span id="ex_twd_val" class="fw-bold">0</span></div>
            <button class="btn btn-earth" onclick="saveEx()">儲存換匯</button>
        </div>
        <div id="ex-list-area" class="table-area"></div>
    </div>

    <div id="sec-exp" class="section">
        <div class="card">
            <h6 id="exp-title">📝 記帳支出</h6>
            <input type="hidden" id="e_rowIdx">
            <select id="e_trip" class="form-select mb-2" onchange="persistTrip(this.value); syncExpUI();"></select>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="e_date" class="form-control"></div>
                <div class="col-6"><select id="e_cat" class="form-select"><option>機票</option><option>電信</option><option>交通</option><option>住宿</option><option>飲食(餐)</option><option>零食點心飲料</option><option>玩樂</option><option>明信片</option><option>郵票</option><option>紀念品(禮用品)</option><option>其他</option><option>團費</option><option>紀念品(食品類)</option><option>保險</option><option>治裝</option></select></div>
            </div>
            <input type="text" id="e_item" class="form-control mb-2" placeholder="品項名稱">
            <div class="row g-2 mb-1">
                <div class="col-7"><input type="number" id="e_amt" class="form-control" placeholder="金額" oninput="calcTwd()"></div>
                <div class="col-5"><select id="e_cur" class="form-select" onchange="calcTwd()"></select></div>
            </div>
            <div class="small mb-2">台幣預估: <span id="e_twd_val" class="fw-bold">0</span></div>
            
            <label class="small fw-bold">付款人:</label><div id="p-box" class="mb-2"></div>
            <div id="p-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <label class="small fw-bold">參與人:</label><div id="m-box" class="mb-2"></div>
            <select id="e_split" class="form-select form-select-sm mb-2" onchange="updateSplitUI()"><option value="平分">平分</option><option value="分攤金額">分攤金額</option></select>
            <div id="m-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <div id="split-summary" class="small text-primary fw-bold mt-1"></div>
            <button class="btn btn-earth mt-2" onclick="saveExp()">儲存記帳</button>
        </div>
        <div id="exp-list-area" class="table-area"></div>
    </div>

    <div id="sec-ana" class="section">
        <div class="card">
            <select id="ana_trip" class="form-select mb-3" onchange="persistTrip(this.value); renderCharts();"></select>
            <div style="height:300px;"><canvas id="anaPie"></canvas></div>
            <div class="mt-4"><canvas id="anaBar"></canvas></div>
            <hr>
            <div class="d-flex justify-content-between"><h6>清算結果</h6><button class="btn btn-sm btn-outline-danger" onclick="settleAll()">Settle Up</button></div>
            <div id="settle-list" class="small p-2 bg-light mt-2 rounded"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" id="nav-trip" onclick="showSec('trip')"><div>✈️</div>旅程</div>
        <div class="nav-item" id="nav-ex" onclick="showSec('ex')"><div>💱</div>換匯</div>
        <div class="nav-item" id="nav-exp" onclick="showSec('exp')"><div>📝</div>記帳</div>
        <div class="nav-item" id="nav-ana" onclick="showSec('ana')"><div>📊</div>分析</div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbicmRk00xed3yYDhAnGLXkztKHOQrwPNttZEBTQapLLgrsbz2aD3xEdNJHQil5h2P/exec"; 
        let db = { Trips: [], Exchange: [], Expenses: [] };
        let charts = {};

        window.onload = async () => { await fetchData(); showSec(localStorage.getItem('activeTab') || 'trip'); };

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                const options = db.Trips.slice(1).map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
                ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => document.getElementById(id).innerHTML = options);
                updateTripList();
            } catch (e) { alert("讀取失敗"); }
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function persistTrip(v) { localStorage.setItem('selectedTrip', v); }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            localStorage.setItem('activeTab', id);
            const lastTrip = localStorage.getItem('selectedTrip');
            if(lastTrip) { ['ex_trip', 'e_trip', 'ana_trip'].forEach(i => document.getElementById(i).value = lastTrip); }
            if(id === 'ex') updateExList();
            if(id === 'exp') syncExpUI();
            if(id === 'ana') renderCharts();
        }

        // --- 旅程 & 換匯列表 (修復 V8 不顯示問題) ---
        function updateTripList() {
            document.getElementById('trip-list-area').innerHTML = db.Trips.slice(1).map((r, i) => `
                <div class="card p-2 mb-2 d-flex justify-content-between flex-row align-items-center">
                    <div><b>${r[0]}</b><br><small>${r[1]}~${r[2]}</small></div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="editTrip(${i+1})">✏️ 編輯</button>
                </div>
            `).join('');
        }
        function updateExList() {
            const cur = document.getElementById('ex_trip').value;
            const filtered = db.Exchange.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == cur);
            document.getElementById('ex-list-area').innerHTML = `<table class="table table-sm"><thead><tr><th>日期</th><th>幣</th><th>匯率</th><th>台幣</th><th>來源</th><th>✏️</th></tr></thead><tbody>` + 
                filtered.map(o => `<tr><td>${o.r[1]}</td><td>${o.r[3]}</td><td>${o.r[4]}</td><td>${o.r[6]}</td><td>${o.r[7]}</td><td><span onclick="editEx(${o.i})">✏️</span></td></tr>`).join('') + `</tbody></table>`;
        }

        // --- 記帳分帳邏輯 (核心需求修正) ---
        function syncExpUI() {
            const trip = db.Trips.find(r => r[0] == document.getElementById('e_trip').value);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            const badge = (cls) => mems.map(m => `<span class="badge-mem ${cls}" onclick="handleBadge(this, '${cls}')">${m}</span>`).join('');
            document.getElementById('p-box').innerHTML = badge('p-b');
            document.getElementById('m-box').innerHTML = badge('m-b');
            
            // 幣別選單修復
            let curs = ["TWD"]; db.Exchange.slice(1).forEach(r => { if(r[0] == trip[0]) curs.push(r[3]); });
            document.getElementById('e_cur').innerHTML = [...new Set(curs)].map(c => `<option value="${c}">${c}</option>`).join('');
            updateExpList();
        }

        function handleBadge(el, cls) { el.classList.toggle('active'); updateSplitUI(); }

        function updateSplitUI() {
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);
            const type = document.getElementById('e_split').value;
            const total = document.getElementById('e_twd_val').innerText;

            // (1) 付款詳情：僅多人選才出現
            const pBox = document.getElementById('p-details');
            if(ps.length > 1) {
                pBox.innerHTML = `多人付款金額分配:<br>` + ps.map(n => `<div class="input-group input-group-sm mb-1"><span class="input-group-text">${n}</span><input type="number" class="form-control p-val" data-mem="${n}" oninput="calcSplitSummary()"></div>`).join('');
                pBox.style.display = 'block';
            } else { pBox.style.display = 'none'; }

            // (2) 分攤詳情：僅分攤金額且多人選才出現
            const mBox = document.getElementById('m-details');
            if(type === '分攤金額' && ms.length > 0 && !(ms.length === 1 && ps.length === 1 && ms[0] === ps[0])) {
                mBox.innerHTML = `分攤金額分配:<br>` + ms.map(n => `<div class="input-group input-group-sm mb-1"><span class="input-group-text">${n}</span><input type="number" class="form-control m-val" data-mem="${n}" oninput="calcSplitSummary()"></div>`).join('');
                mBox.style.display = 'block';
            } else { mBox.style.display = 'none'; }
            
            calcSplitSummary();
        }

        function calcSplitSummary() {
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);
            const type = document.getElementById('e_split').value;
            const total = Number(document.getElementById('e_twd_val').innerText);
            let txt = "";
            if(ps.length > 0 && ms.length > 0) {
                if(type === '平分') txt = `每人分攤: ${Math.round(total/ms.length)} TWD`;
            }
            document.getElementById('split-summary').innerText = txt;
        }

        function calcTwd() {
            const cur = document.getElementById('e_cur').value;
            const amt = Number(document.getElementById('e_amt').value);
            if(cur === "TWD") { document.getElementById('e_twd_val').innerText = amt; }
            else {
                const ex = db.Exchange.slice(1).reverse().find(r => r[0] == document.getElementById('e_trip').value && r[3] == cur);
                document.getElementById('e_twd_val').innerText = ex ? Math.round(amt * ex[4]) : 0;
            }
            updateSplitUI();
        }

        function updateExpList() {
            const curTrip = document.getElementById('e_trip').value;
            const data = db.Expenses.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == curTrip);
            let h = `<table class="table table-sm" id="expTable"><thead><tr>
                <th><input class="filter-input" placeholder="日期" onkeyup="filterTable(0,this)"></th>
                <th><input class="filter-input" placeholder="類別" onkeyup="filterTable(1,this)"></th>
                <th><input class="filter-input" placeholder="品項" onkeyup="filterTable(2,this)"></th>
                <th>台幣</th><th>參與者</th><th>✏️</th></tr></thead><tbody>`;
            h += data.map(o => `<tr><td>${o.r[1]}</td><td>${o.r[2]}</td><td>${o.r[3]}</td><td>${o.r[6]}</td><td>${o.r[8]}</td><td><span onclick="editExp(${o.i})">✏️</span></td></tr>`).join('') + `</tbody></table>`;
            document.getElementById('exp-list-area').innerHTML = h;
        }
        function filterTable(idx, el) {
            const v = el.value.toLowerCase();
            document.querySelectorAll("#expTable tbody tr").forEach(r => r.style.display = r.cells[idx].innerText.toLowerCase().includes(v) ? "" : "none");
        }

        // --- 編輯功能修復 ---
        function editTrip(idx) {
            const r = db.Trips[idx]; document.getElementById('t_rowIdx').value = idx; document.getElementById('t_name').value = r[0]; document.getElementById('t_start').value = r[1]; document.getElementById('t_end').value = r[2]; document.getElementById('t_members').value = r[3]; window.scrollTo(0,0);
        }
        function editEx(idx) {
            const r = db.Exchange[idx]; document.getElementById('ex_rowIdx').value = idx; document.getElementById('ex_date').value = r[1]; document.getElementById('ex_loc').value = r[2]; document.getElementById('ex_cur').value = r[3]; document.getElementById('ex_rate').value = r[4]; document.getElementById('ex_amt').value = r[5]; document.getElementById('ex_src').value = r[7]; calcExTwd(); window.scrollTo(0,0);
        }
        function editExp(idx) {
            const r = db.Expenses[idx]; document.getElementById('e_rowIdx').value = idx; document.getElementById('e_date').value = r[1]; document.getElementById('e_cat').value = r[2]; document.getElementById('e_item').value = r[3]; document.getElementById('e_amt').value = r[4]; document.getElementById('e_cur').value = r[5]; calcTwd(); window.scrollTo(0,0);
        }

        // --- 分析 & 清算 (精確淨額邏輯) ---
        function renderCharts() {
            const t = document.getElementById('ana_trip').value;
            const all = db.Expenses.slice(1).filter(r => r[0] == t);
            const trip = db.Trips.find(r => r[0] == t);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            
            // 圓餅圖
            const cats = {}; let total = 0;
            all.forEach(r => { cats[r[2]] = (cats[r[2]] || 0) + Number(r[6]); total += Number(r[6]); });
            drawPie('anaPie', Object.keys(cats), Object.values(cats), total);

            // 柱狀圖 (每人一柱)
            const personData = mems.map(m => {
                let sum = 0;
                all.forEach(r => { if(r[8].split(',').includes(m)) sum += Number(r[6]) / r[8].split(',').length; });
                return Math.round(sum);
            });
            drawBar('anaBar', mems, personData);

            // 清算 (A付100 B付50 平分範例邏輯)
            let bal = {}; mems.forEach(m => bal[m] = 0);
            all.filter(r => r[12] !== "已結清").forEach(r => {
                const twd = Number(r[6]);
                const ps = r[7].split(','); const ms = r[8].split(',');
                // 付款 (增加餘額)
                if(r[11].includes('[P:')) {
                    r[11].match(/\[P:(.*?)\]/)[1].split('|').forEach(p => { const [n,v]=p.split(':'); bal[n]+=Number(v); });
                } else { bal[r[7]] += twd; }
                // 支出 (扣除餘額)
                if(r[11].includes('[M:')) {
                    r[11].match(/\[M:(.*?)\]/)[1].split('|').forEach(p => { const [n,v]=p.split(':'); bal[n]-=Number(v); });
                } else { ms.forEach(m => bal[m] -= twd/ms.length); }
            });
            document.getElementById('settle-list').innerHTML = Object.entries(bal).map(([m,b]) => `<div class="d-flex justify-content-between"><span>${m}</span><span class="${b>=0?'text-success':'text-danger'}">${b>=0?'應收':'應付'} ${Math.abs(Math.round(b))}</span></div>`).join('');
        }

        function drawPie(id, labels, data, total) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#4f6d5a','#8c7b6c','#d9c5b2','#b66a50','#2d4a3e'] }] }, options: { plugins: { legend: { position:'bottom' }, tooltip: { callbacks: { label: (c) => `${c.label}: ${c.raw} (${Math.round(c.raw/total*100)}%)` } } } } });
        }
        function drawBar(id, labels, data) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), { type:'bar', data: { labels, datasets:[{ label:'總支出分攤', data, backgroundColor: '#8c7b6c' }] } });
        }

        async function postData(sheet, data, rowIdx, override = null) {
            toggleLoader(true);
            const method = override || (rowIdx ? "update" : "append");
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({sheet, method, data, rowIdx, tripName: localStorage.getItem('selectedTrip')}) });
            await fetchData();
            toggleLoader(false);
        }
        async function saveTrip() { await postData('Trips', [document.getElementById('t_name').value, document.getElementById('t_start').value, document.getElementById('t_end').value, document.getElementById('t_members').value, document.getElementById('t_base').value], document.getElementById('t_rowIdx').value); }
        async function saveEx() { await postData('Exchange', [document.getElementById('ex_trip').value, document.getElementById('ex_date').value, document.getElementById('ex_loc').value, document.getElementById('ex_cur').value, document.getElementById('ex_rate').value, document.getElementById('ex_amt').value, document.getElementById('ex_twd_val').innerText, document.getElementById('ex_src').value], document.getElementById('ex_rowIdx').value); }
        async function saveExp() {
            const pVal = Array.from(document.querySelectorAll('.p-val')).map(i => `${i.dataset.mem}:${i.value}`).join('|');
            const mVal = Array.from(document.querySelectorAll('.m-val')).map(i => `${i.dataset.mem}:${i.value}`).join('|');
            const data = [document.getElementById('e_trip').value, document.getElementById('e_date').value, document.getElementById('e_cat').value, document.getElementById('e_item').value, document.getElementById('e_amt').value, document.getElementById('e_cur').value, document.getElementById('e_twd_val').innerText, Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText).join(','), Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText).join(','), document.getElementById('e_split').value, "", `[P:${pVal}][M:${mVal}]` ];
            await postData('Expenses', data, document.getElementById('e_rowIdx').value);
        }
        async function settleAll() { if(confirm("結清將重設清算清單，但保留分析圖表？")) await postData('Expenses', [], null, 'settleAll'); }
    </script>
</body>
</html>
