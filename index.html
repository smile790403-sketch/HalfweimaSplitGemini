<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大地分帳 V12 終極整合版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sage: #4f6d5a; --earth: #8c7b6c; --beige: #f5f5dc; --dark: #2d4a3e; --terracotta: #b66a50; }
        body { background-color: var(--beige); font-family: sans-serif; padding-bottom: 90px; }
        .app-header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index:1000; }
        .nav-bottom { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; flex:1; cursor: pointer; }
        .nav-item.active { color: var(--sage); font-weight: bold; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; padding: 15px; }
        .btn-earth { background: var(--sage); color: white; border-radius: 10px; width: 100%; padding: 10px; font-weight: bold; border: none; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .badge-mem { background: #eee; padding: 5px 12px; border-radius: 20px; margin: 3px; display: inline-block; cursor: pointer; font-size: 0.85rem; border: 1px solid #ddd; }
        .badge-mem.active { background: var(--earth); color: white; border-color: var(--earth); }
        .edit-btn { cursor: pointer; color: var(--earth); font-weight: bold; font-size: 0.8rem; }
        .table-area { background: white; border-radius: 10px; padding: 10px; overflow-x: auto; font-size: 0.75rem; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); display:none; align-items:center; justify-content:center; z-index:9999; flex-direction: column; }
    </style>
</head>
<body>

    <div class="loading" id="loader"><div class="spinner-border text-success mb-2"></div>同步數據中...</div>
    <div class="app-header" onclick="fetchData()">🌏 大地分帳 V12</div>

    <div id="sec-trip" class="section">
        <div class="card">
            <h6>✈️ 旅程管理</h6>
            <input type="hidden" id="t_rowIdx">
            <input type="text" id="t_name" class="form-control mb-2" placeholder="旅程名稱">
            <div class="row g-2 mb-2">
                <div class="col"><input type="date" id="t_start" class="form-control"></div>
                <div class="col"><input type="date" id="t_end" class="form-control"></div>
            </div>
            <input type="text" id="t_members" class="form-control mb-3" placeholder="參與者 (用逗號隔開)">
            <button class="btn btn-earth" onclick="saveTrip()">儲存旅程</button>
        </div>
        <div id="trip-list-area"></div>
    </div>

    <div id="sec-ex" class="section">
        <div class="card">
            <h6>💱 換匯紀錄</h6>
            <input type="hidden" id="ex_rowIdx">
            <select id="ex_trip" class="form-select mb-2" onchange="syncSelectedTrip(this.value); updateExList();"></select>
            <div class="row g-2 mb-2"><div class="col-6"><input type="date" id="ex_date" class="form-control"></div><div class="col-6"><input type="text" id="ex_loc" class="form-control" placeholder="換匯所"></div></div>
            <div class="row g-2 mb-2">
                <div class="col-4"><input type="text" id="ex_cur" class="form-control" placeholder="幣別"></div>
                <div class="col-8"><input type="number" id="ex_rate" class="form-control" placeholder="匯率" oninput="calcExTwd()"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="number" id="ex_amt" class="form-control" placeholder="外幣金額" oninput="calcExTwd()"></div>
                <div class="col-6"><input type="text" id="ex_src" class="form-control" placeholder="來源"></div>
            </div>
            <div class="small mb-3">台幣金額: <span id="ex_twd_display" class="fw-bold text-danger">0</span></div>
            <button class="btn btn-earth" onclick="saveEx()">儲存換匯</button>
        </div>
        <div id="ex-list-area" class="table-area"></div>
    </div>

    <div id="sec-exp" class="section">
        <div class="card">
            <h6>📝 支出記帳</h6>
            <input type="hidden" id="e_rowIdx">
            <select id="e_trip" class="form-select mb-2" onchange="syncSelectedTrip(this.value); syncExpUI();"></select>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="e_date" class="form-control"></div>
                 <div class="col-6"><select id="e_cat" class="form-select"><option>機票</option><option>電信</option><option>交通</option><option>住宿</option><option>飲食(餐)</option><option>零食點心飲料</option><option>玩樂</option><option>明信片</option><option>郵票</option><option>紀念品(禮用品)</option><option>其他</option><option>團費</option><option>紀念品(食品類)</option><option>保險</option><option>治裝</option></select></div>
            </div>
            <input type="text" id="e_item" class="form-control mb-2" placeholder="品項名稱">
            <div class="row g-2 mb-1">
                <div class="col-7"><input type="number" id="e_amt" class="form-control" placeholder="金額" oninput="calcTwd(); updateSplitUI();"></div>
                <div class="col-5"><select id="e_cur" class="form-select" onchange="calcTwd()"></select></div>
            </div>
            <div class="small mb-2 text-muted">台幣預估: <span id="e_twd_val" class="fw-bold text-danger">0</span></div>
            
            <div class="row g-2 mb-2">
                <div class="col-6"><select id="e_pay_method" class="form-select"><option value="現金">💵 現金</option><option value="信用卡">💳 信用卡</option><option value="行動支付">📱 行動支付</option><option value="轉帳">🏦 轉帳</option></select></div>
                <div class="col-6"><input type="text" id="e_note" class="form-control" placeholder="備註"></div>
            </div>

            <label class="small fw-bold">誰付錢？</label><div id="p-box" class="mb-2"></div>
            <div id="p-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <label class="small fw-bold">誰分攤？</label><div id="m-box" class="mb-2"></div>
            <select id="e_split_type" class="form-select form-select-sm mb-2" onchange="updateSplitUI()">
                <option value="平分">平分</option><option value="分攤金額">分攤金額</option>
            </select>
            <div id="m-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <button class="btn btn-earth mt-2" onclick="saveExp()">儲存記帳</button>
        </div>
        <div id="exp-list-area" class="table-area"></div>
    </div>

    <div id="sec-ana" class="section">
        <div class="card text-center">
            <select id="ana_trip" class="form-select mb-3" onchange="syncSelectedTrip(this.value); renderCharts();"></select>
            <div class="mb-4"><canvas id="anaPie"></canvas></div>
            <div style="height: 300px;"><canvas id="anaBar"></canvas></div>
            <hr>
            <h6 class="fw-bold">💰 台幣清算結果</h6>
            <div id="settle-list" class="small p-3 bg-light rounded text-start"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" id="nav-trip" onclick="showSec('trip')"><div>✈️</div>旅程</div>
        <div class="nav-item" id="nav-ex" onclick="showSec('ex')"><div>💱</div>換匯</div>
        <div class="nav-item" id="nav-exp" onclick="showSec('exp')"><div>📝</div>記帳</div>
        <div class="nav-item" id="nav-ana" onclick="showSec('ana')"><div>📊</div>分析</div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzbicmRk00xed3yYDhAnGLXkztKHOQrwPNttZEBTQapLLgrsbz2aD3xEdNJHQil5h2P/exec"; 
        let db = { Trips: [], Exchange: [], Expenses: [] };
        let charts = {};

        window.onload = async () => { 
            await fetchData(); 
            showSec(localStorage.getItem('activeTab') || 'exp'); 
        };

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                renderCommonUI();
            } catch (e) { alert("讀取失敗，請檢查網路或 GAS 設定"); }
            toggleLoader(false);
        }

        function renderCommonUI() {
            const options = db.Trips.slice(1).map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => document.getElementById(id).innerHTML = options);
            
            const savedTrip = localStorage.getItem('selectedTrip');
            if (savedTrip) syncSelectedTrip(savedTrip);

            updateTripList();
            updateExList();
            syncExpUI();
            if(localStorage.getItem('activeTab') === 'ana') renderCharts();
        }

        function syncSelectedTrip(val) {
            localStorage.setItem('selectedTrip', val);
            ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => { document.getElementById(id).value = val; });
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            localStorage.setItem('activeTab', id);
            if (id === 'ana') renderCharts();
        }

        // --- 核心連動計算邏輯 ---
        function handleAutoFill(containerId, totalAmount, inputClass) {
            const inputs = Array.from(document.querySelectorAll(`#${containerId} .${inputClass}`));
            const filled = inputs.filter(i => i.value !== "");
            const empty = inputs.filter(i => i.value === "");

            if (empty.length === 1) {
                const currentSum = filled.reduce((sum, i) => sum + parseFloat(i.value || 0), 0);
                empty[0].placeholder = Math.max(0, totalAmount - currentSum).toFixed(0);
            }
        }

        function updateSplitUI() {
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);
            const total = parseFloat(document.getElementById('e_amt').value) || 0;
            const splitType = document.getElementById('e_split_type').value;

            const pBox = document.getElementById('p-details');
            if(ps.length > 1) {
                pBox.innerHTML = `<small class="text-muted">多人付款金額:</small>` + ps.map(n => `<div class="input-group input-group-sm mb-1"><span class="input-group-text">${n}</span><input type="number" class="form-control p-val" data-mem="${n}" oninput="handleAutoFill('p-details', ${total}, 'p-val')"></div>`).join('');
                pBox.style.display = 'block';
            } else { pBox.style.display = 'none'; }

            const mBox = document.getElementById('m-details');
            if(splitType === '分攤金額' && ms.length > 0) {
                mBox.innerHTML = `<small class="text-muted">各別分攤金額:</small>` + ms.map(n => `<div class="input-group input-group-sm mb-1"><span class="input-group-text">${n}</span><input type="number" class="form-control m-val" data-mem="${n}" oninput="handleAutoFill('m-details', ${total}, 'm-val')"></div>`).join('');
                mBox.style.display = 'block';
            } else { mBox.style.display = 'none'; }
        }

        // --- 儲存與重設 ---
        async function saveExp() {
            const total = parseFloat(document.getElementById('e_amt').value) || 0;
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);

            const getDetail = (selector, members) => {
                return Array.from(document.querySelectorAll(selector)).map(i => {
                    let v = parseFloat(i.value);
                    if (isNaN(v)) v = parseFloat(i.placeholder) || (total / members.length);
                    return `${i.dataset.mem}:${v.toFixed(2)}`;
                }).join('|');
            };

            const pDetail = ps.length > 1 ? getDetail('.p-val', ps) : "";
            const mDetail = document.getElementById('e_split_type').value === '分攤金額' ? getDetail('.m-val', ms) : "";

            const data = [
                document.getElementById('e_trip').value, document.getElementById('e_date').value, document.getElementById('e_cat').value, document.getElementById('e_item').value, 
                document.getElementById('e_amt').value, document.getElementById('e_cur').value, document.getElementById('e_twd_val').innerText, 
                ps.join(','), ms.join(','), document.getElementById('e_split_type').value, 
                document.getElementById('e_pay_method').value, document.getElementById('e_note').value, "", `[P:${pDetail}][M:${mDetail}]`
            ];

            await postData('Expenses', data, document.getElementById('e_rowIdx').value);
            ['e_rowIdx', 'e_item', 'e_amt', 'e_note'].forEach(id => document.getElementById(id).value = "");
            syncExpUI();
        }

        // --- 清算與圖表 ---
        function renderCharts() {
            const t = document.getElementById('ana_trip').value;
            const exps = db.Expenses.slice(1).filter(r => r[0] == t);
            const trip = db.Trips.find(r => r[0] == t);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());

            let bal = {}; mems.forEach(m => bal[m] = 0);
            exps.forEach(r => {
                const twd = parseFloat(r[6]) || 0;
                // 付款計算
                if(r[13] && r[13].includes('[P:')) {
                    r[13].match(/\[P:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); if(bal[n]!==undefined) bal[n]+=parseFloat(v); });
                } else { if(bal[r[7]]) bal[r[7]] += twd; }
                // 分攤計算
                const ms = r[8].split(',');
                if(r[9] === '分攤金額' && r[13].includes('[M:')) {
                    r[13].match(/\[M:(.*?)\]/)[1].split('|').forEach(s => { const [n,v]=s.split(':'); if(bal[n]!==undefined) bal[n]-=parseFloat(v); });
                } else { ms.forEach(m => { if(bal[m]!==undefined) bal[m] -= twd/ms.length; }); }
            });

            let debtors = [], creditors = [];
            Object.entries(bal).forEach(([n, b]) => {
                if (b < -1) debtors.push({n, amt: Math.abs(b)});
                else if (b > 1) creditors.push({n, amt: b});
            });

            let sHtml = "";
            while(debtors.length > 0 && creditors.length > 0) {
                let d = debtors[0], c = creditors[0], amt = Math.min(d.amt, c.amt);
                sHtml += `<div class="border-bottom py-1"><b>${d.n}</b> ➜ ${c.n} <span class="text-danger float-end">$${Math.round(amt)}</span></div>`;
                d.amt -= amt; c.amt -= amt;
                if(d.amt <= 1) debtors.shift();
                if(c.amt <= 1) creditors.shift();
            }
            document.getElementById('settle-list').innerHTML = sHtml || "🎉 已結清！";
            // ...此處可補上原本的 Chart.js 繪製邏輯...
        }

        // --- 通用工具 ---
        async function postData(sheet, data, rowIdx) {
            toggleLoader(true);
            const method = rowIdx ? "update" : "append";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({sheet, method, data, rowIdx}) });
            await fetchData();
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        
        function updateTripList() {
            document.getElementById('trip-list-area').innerHTML = db.Trips.slice(1).map((r, i) => `
                <div class="card p-2 mb-2 d-flex justify-content-between flex-row align-items-center">
                    <div><b>${r[0]}</b><br><small>${r[1]} ~ ${r[2]}</small></div>
                    <span class="edit-btn" onclick="editTrip(${i+1})">✏️</span>
                </div>
            `).join('');
        }

        function syncExpUI() {
            const trip = db.Trips.find(r => r[0] == document.getElementById('e_trip').value);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            const badge = (cls) => mems.map(m => `<span class="badge-mem ${cls}" onclick="this.classList.toggle('active'); updateSplitUI();">${m}</span>`).join('');
            document.getElementById('p-box').innerHTML = badge('p-b');
            document.getElementById('m-box').innerHTML = badge('m-b');
            
            let curs = ["TWD"];
            db.Exchange.slice(1).forEach(r => { if(r[0] == trip[0]) curs.push(r[3]); });
            document.getElementById('e_cur').innerHTML = [...new Set(curs)].map(c => `<option value="${c}">${c}</option>`).join('');
            updateExpList();
        }

        function updateExList() {
            const t = document.getElementById('ex_trip').value;
            const filtered = db.Exchange.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == t);
            document.getElementById('ex-list-area').innerHTML = `<table class="table table-sm"><thead><tr><th>日期</th><th>幣別</th><th>台幣</th><th>✏️</th></tr></thead><tbody>` + 
                filtered.map(o => `<tr><td>${o.r[1]}</td><td>${o.r[3]}</td><td>${o.r[6]}</td><td><span class="edit-btn" onclick="editEx(${o.i})">✏️</span></td></tr>`).join('') + `</tbody></table>`;
        }

        function updateExpList() {
            const t = document.getElementById('e_trip').value;
            const data = db.Expenses.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == t);
            document.getElementById('exp-list-area').innerHTML = `<table class="table table-sm"><thead><tr><th>品項</th><th>台幣</th><th>✏️</th></tr></thead><tbody>` + 
                data.map(o => `<tr><td>${o.r[3]}</td><td>${o.r[6]}</td><td><span class="edit-btn" onclick="editExp(${o.i})">✏️</span></td></tr>`).join('') + `</tbody></table>`;
        }

        function calcExTwd() {
            const r = parseFloat(document.getElementById('ex_rate').value) || 0;
            const a = parseFloat(document.getElementById('ex_amt').value) || 0;
            document.getElementById('ex_twd_display').innerText = Math.round(r * a);
        }

        function calcTwd() {
            const cur = document.getElementById('e_cur').value;
            const amt = parseFloat(document.getElementById('e_amt').value) || 0;
            if(cur === "TWD") { document.getElementById('e_twd_val').innerText = amt; }
            else {
                const ex = db.Exchange.slice(1).reverse().find(r => r[0] == document.getElementById('e_trip').value && r[3] == cur);
                document.getElementById('e_twd_val').innerText = ex ? Math.round(amt * ex[4]) : "匯率未知";
            }
        }
    </script>
</body>
</html>
