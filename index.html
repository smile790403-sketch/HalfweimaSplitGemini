<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大地分帳 V12.5 專業分帳版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sage: #4f6d5a; --earth: #8c7b6c; --beige: #f5f5dc; --dark: #2d4a3e; --terracotta: #b66a50; }
        body { background-color: var(--beige); font-family: sans-serif; padding-bottom: 90px; }
        .app-header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index:1000; cursor: pointer; }
        .nav-bottom { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; flex:1; cursor: pointer; }
        .nav-item.active { color: var(--sage); font-weight: bold; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; padding: 15px; }
        .btn-earth { background: var(--sage); color: white; border-radius: 10px; width: 100%; padding: 10px; font-weight: bold; border: none; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .badge-mem { background: #eee; padding: 5px 12px; border-radius: 20px; margin: 3px; display: inline-block; cursor: pointer; font-size: 0.85rem; border: 1px solid #ddd; }
        .badge-mem.active { background: var(--earth); color: white; border-color: var(--earth); }
        .edit-btn { cursor: pointer; color: var(--earth); font-weight: bold; margin-left: 5px; }
        .del-btn { cursor: pointer; color: #dc3545; font-weight: bold; margin-left: 5px; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); display:none; align-items:center; justify-content:center; z-index:9999; flex-direction: column; }
        .chart-container { position: relative; height: 250px; margin-bottom: 30px; }
        .pie-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -20%); text-align: center; pointer-events: none; line-height: 1.2; }
        .table-area { background: white; border-radius: 10px; padding: 5px; overflow-x: auto; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="loading" id="loader"><div class="spinner-border text-success mb-2"></div>同步中...</div>
    <div class="app-header" onclick="fetchData()">🌏 大地分帳 V12 (分帳強化版)</div>

    <div id="sec-trip" class="section">
        <div class="card">
            <h6 class="fw-bold">✈️ 旅程管理</h6>
            <input type="hidden" id="t_rowIdx">
            <input type="text" id="t_name" class="form-control mb-2" placeholder="旅程名稱">
            <div class="row g-2 mb-2"><div class="col"><input type="date" id="t_start" class="form-control"></div><div class="col"><input type="date" id="t_end" class="form-control"></div></div>
            <input type="text" id="t_members" class="form-control mb-3" placeholder="參與者 (逗號隔開)">
            <button class="btn btn-earth" onclick="saveTrip()">儲存旅程</button>
        </div>
        <div id="trip-list-area"></div>
    </div>

    <div id="sec-ex" class="section">
        <div class="card">
            <h6 class="fw-bold">💱 換匯紀錄</h6>
            <input type="hidden" id="ex_rowIdx">
            <select id="ex_trip" class="form-select mb-2" onchange="syncTrip(this.value); updateExList();"></select>
            <div class="row g-2 mb-2"><div class="col-6"><input type="date" id="ex_date" class="form-control"></div><div class="col-6"><input type="text" id="ex_loc" class="form-control" placeholder="換匯所"></div></div>
            <div class="row g-2 mb-2">
                <div class="col-4"><input type="text" id="ex_cur" class="form-control" placeholder="幣別"></div>
                <div class="col-8"><input type="number" id="ex_rate" class="form-control" placeholder="匯率 (1外幣=?台幣)" oninput="calcExTwd()"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="number" id="ex_amt" class="form-control" placeholder="金額" oninput="calcExTwd()"></div>
                <div class="col-6"><input type="text" id="ex_src" class="form-control" placeholder="來源 (如現金)"></div>
            </div>
            <div class="small mb-3">台幣金額: <span id="ex_twd_display" class="fw-bold text-danger">0</span></div>
            <button class="btn btn-earth" onclick="saveEx()">儲存換匯</button>
        </div>
        <div id="ex-list-area" class="table-area"></div>
    </div>

    <div id="sec-exp" class="section">
        <div class="card">
            <h6 class="fw-bold">📝 支出記帳</h6>
            <input type="hidden" id="e_rowIdx">
            <select id="e_trip" class="form-select mb-2" onchange="syncTrip(this.value); syncExpUI();"></select>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="e_date" class="form-control"></div>
                <div class="col-6"><select id="e_cat" class="form-select"><option>機票</option><option>交通</option><option>住宿</option><option>飲食(餐)</option><option>零食點心飲料</option><option>玩樂</option><option>紀念品(禮用品)</option><option>紀念品(食品)</option><option>團費</option><option>保險</option><option>其他</option></select></div>
            </div>
            <input type="text" id="e_item" class="form-control mb-2" placeholder="品項名稱">
            <div class="row g-2 mb-1">
                <div class="col-7"><input type="number" id="e_amt" class="form-control" placeholder="金額" oninput="calcTwd(); updateSplitUI();"></div>
                <div class="col-5"><select id="e_cur" class="form-select" onchange="calcTwd()"></select></div>
            </div>
            <div class="small mb-2 text-muted">台幣預估: <span id="e_twd_val" class="fw-bold text-danger">0</span></div>
            
            <label class="small fw-bold">誰付錢？</label><div id="p-box" class="mb-2"></div>
            <div id="p-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <label class="small fw-bold">誰分攤？</label><div id="m-box" class="mb-2"></div>
            <select id="e_split_type" class="form-select form-select-sm mb-2" onchange="updateSplitUI()">
                <option value="平分">平分</option><option value="分攤金額">分攤金額</option>
            </select>
            <div id="m-details" style="display:none;" class="bg-light p-2 mb-2 rounded"></div>

            <div class="row g-2 mb-2">
                <div class="col-6"><select id="e_pay_method" class="form-select"><option>💵 現金</option><option>💳 信用卡</option><option>📱 行動支付</option><option>🏦 轉帳</option></select></div>
                <div class="col-6"><input type="text" id="e_note" class="form-control" placeholder="備註"></div>
            </div>
            <button class="btn btn-earth mt-2" onclick="saveExp()">儲存記帳</button>
        </div>
        <div id="exp-list-area" class="table-area"></div>
    </div>

    <div id="sec-ana" class="section">
        <div class="card">
            <select id="ana_trip" class="form-select mb-3" onchange="syncTrip(this.value); renderCharts();"></select>
            
            <p class="small fw-bold text-center mb-3">個人支出分析 (TWD)</p>
            <div id="pie-container"></div> <p class="small fw-bold text-center">總體支出類別分佈</p>
            <div class="chart-container" style="height: 300px;"><canvas id="anaBar"></canvas></div>
            
            <hr>
            <h6 class="fw-bold">💰 淨額清算結果 (TWD)</h6>
            <div id="settle-list" class="small p-3 bg-light rounded shadow-sm"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" id="nav-trip" onclick="showSec('trip')"><div>✈️</div>旅程</div>
        <div class="nav-item" id="nav-ex" onclick="showSec('ex')"><div>💱</div>換匯</div>
        <div class="nav-item" id="nav-exp" onclick="showSec('exp')"><div>📝</div>記帳</div>
        <div class="nav-item" id="nav-ana" onclick="showSec('ana')"><div>📊</div>分析</div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzBBA5gKhn-Ld52mW0bDH9rxKLSy0qYPfaC3zF4eVnuadZ1aG-5EOQ06MeaTmhoefY/exec"; 
        let db = { Trips: [], Exchange: [], Expenses: [] };
        let charts = {};

        window.onload = async () => { 
            await fetchData(); 
            showSec(localStorage.getItem('activeTab') || 'exp'); 
        };

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                renderUI();
            } catch (e) { alert("讀取失敗"); }
            toggleLoader(false);
        }

        function renderUI() {
            const tripOptions = db.Trips.slice(1).map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => document.getElementById(id).innerHTML = tripOptions);
            const lastTrip = localStorage.getItem('selectedTrip');
            if(lastTrip) syncTrip(lastTrip);
            updateTripList();
            updateExList();
            syncExpUI();
            if(localStorage.getItem('activeTab') === 'ana') renderCharts();
        }

        function syncTrip(val) {
            localStorage.setItem('selectedTrip', val);
            ['ex_trip', 'e_trip', 'ana_trip'].forEach(id => { document.getElementById(id).value = val; });
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            localStorage.setItem('activeTab', id);
            if(id === 'ana') renderCharts();
        }

        function handleAutoFill(containerId, total, inputCls) {
            const inputs = Array.from(document.querySelectorAll(`#${containerId} .${inputCls}`));
            const filled = inputs.filter(i => i.value !== "");
            const empty = inputs.filter(i => i.value === "");
            if (empty.length === 1) {
                const sum = filled.reduce((s, i) => s + parseFloat(i.value || 0), 0);
                empty[0].placeholder = Math.max(0, total - sum).toFixed(0);
            }
        }

        function updateSplitUI() {
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);
            const total = parseFloat(document.getElementById('e_amt').value) || 0;
            const type = document.getElementById('e_split_type').value;

            const pBox = document.getElementById('p-details');
            if(ps.length > 1) {
                pBox.innerHTML = ps.map(n => `<div class="input-group input-group-sm mb-1"><span class="input-group-text">${n}</span><input type="number" class="form-control p-val" data-mem="${n}" oninput="handleAutoFill('p-details', ${total}, 'p-val')"></div>`).join('');
                pBox.style.display = 'block';
            } else { pBox.style.display = 'none'; }

            const mBox = document.getElementById('m-details');
            if(type === '分攤金額' && ms.length > 0) {
                mBox.innerHTML = ms.map(n => `<div class="input-group input-group-sm mb-1"><span class="input-group-text">${n}</span><input type="number" class="form-control m-val" data-mem="${n}" oninput="handleAutoFill('m-details', ${total}, 'm-val')"></div>`).join('');
                mBox.style.display = 'block';
            } else { mBox.style.display = 'none'; }
        }

        async function saveTrip() {
            const data = [document.getElementById('t_name').value, document.getElementById('t_start').value, document.getElementById('t_end').value, document.getElementById('t_members').value, "TWD"];
            await postData('Trips', data, document.getElementById('t_rowIdx').value);
            document.getElementById('t_rowIdx').value = ""; document.getElementById('t_name').value = "";
        }

        async function saveEx() {
            const data = [document.getElementById('ex_trip').value, document.getElementById('ex_date').value, document.getElementById('ex_loc').value, document.getElementById('ex_cur').value, document.getElementById('ex_rate').value, document.getElementById('ex_amt').value, document.getElementById('ex_twd_display').innerText, document.getElementById('ex_src').value];
            await postData('Exchange', data, document.getElementById('ex_rowIdx').value);
            document.getElementById('ex_rowIdx').value = "";
        }

        async function saveExp() {
            const total = parseFloat(document.getElementById('e_amt').value) || 0;
            const ps = Array.from(document.querySelectorAll('.p-b.active')).map(e => e.innerText);
            const ms = Array.from(document.querySelectorAll('.m-b.active')).map(e => e.innerText);
            if(ps.length === 0 || ms.length === 0) { alert("請選擇付款人與分攤人"); return; }
            
            const getD = (sel, mems) => Array.from(document.querySelectorAll(sel)).map(i => {
                let v = parseFloat(i.value) || parseFloat(i.placeholder) || (total/mems.length);
                return `${i.dataset.mem}:${v.toFixed(2)}`;
            }).join('|');

            const pD = ps.length > 1 ? getD('.p-val', ps) : "";
            const mD = document.getElementById('e_split_type').value === '分攤金額' ? getD('.m-val', ms) : "";

            const data = [
                document.getElementById('e_trip').value, document.getElementById('e_date').value, document.getElementById('e_cat').value, document.getElementById('e_item').value, 
                document.getElementById('e_amt').value, document.getElementById('e_cur').value, document.getElementById('e_twd_val').innerText, 
                ps.join(','), ms.join(','), document.getElementById('e_split_type').value, 
                document.getElementById('e_pay_method').value, document.getElementById('e_note').value, "", `[P:${pD}][M:${mD}]`
            ];
            await postData('Expenses', data, document.getElementById('e_rowIdx').value);
            document.getElementById('e_rowIdx').value = ""; document.getElementById('e_item').value = ""; document.getElementById('e_amt').value = "";
        }

        async function deleteData(sheet, idx) {
            if(!confirm("確定刪除？")) return;
            toggleLoader(true);
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({sheet, method: "delete", rowIdx: idx}) });
            await fetchData();
            toggleLoader(false);
        }

        function editTrip(idx) {
            const r = db.Trips[idx];
            document.getElementById('t_rowIdx').value = idx;
            document.getElementById('t_name').value = r[0]; document.getElementById('t_start').value = r[1];
            document.getElementById('t_end').value = r[2]; document.getElementById('t_members').value = r[3];
            showSec('trip');
        }

        function editEx(idx) {
            const r = db.Exchange[idx];
            document.getElementById('ex_rowIdx').value = idx;
            document.getElementById('ex_date').value = r[1]; document.getElementById('ex_loc').value = r[2];
            document.getElementById('ex_cur').value = r[3]; document.getElementById('ex_rate').value = r[4];
            document.getElementById('ex_amt').value = r[5]; document.getElementById('ex_src').value = r[7];
            calcExTwd(); showSec('ex');
        }

        function editExp(idx) {
            const r = db.Expenses[idx];
            document.getElementById('e_rowIdx').value = idx;
            document.getElementById('e_date').value = r[1]; document.getElementById('e_cat').value = r[2];
            document.getElementById('e_item').value = r[3]; document.getElementById('e_amt').value = r[4];
            document.getElementById('e_cur').value = r[5]; document.getElementById('e_split_type').value = r[9];
            document.getElementById('e_pay_method').value = r[10]; document.getElementById('e_note').value = r[11];
            
            syncExpUI();
            setTimeout(() => {
                const ps = r[7].split(','), ms = r[8].split(','), meta = r[13] || "";
                document.querySelectorAll('.p-b').forEach(b => { if(ps.includes(b.innerText)) b.classList.add('active'); });
                document.querySelectorAll('.m-b').forEach(b => { if(ms.includes(b.innerText)) b.classList.add('active'); });
                updateSplitUI();
                // 恢復手動輸入金額
                if(meta.includes('[M:')){
                    const mMatch = meta.match(/\[M:(.*?)\]/);
                    if(mMatch) mMatch[1].split('|').forEach(s => {
                        const [n, v] = s.split(':');
                        const input = document.querySelector(`.m-val[data-mem="${n}"]`);
                        if(input) input.value = v;
                    });
                }
                if(meta.includes('[P:')){
                    const pMatch = meta.match(/\[P:(.*?)\]/);
                    if(pMatch) pMatch[1].split('|').forEach(s => {
                        const [n, v] = s.split(':');
                        const input = document.querySelector(`.p-val[data-mem="${n}"]`);
                        if(input) input.value = v;
                    });
                }
            }, 150);
            showSec('exp');
        }

        // --- 核心分析與清算邏輯 (需求 3, 4, 6) ---
        function renderCharts() {
            const tName = document.getElementById('ana_trip').value;
            const exps = db.Expenses.slice(1).filter(r => r[0] == tName);
            const trip = db.Trips.find(r => r[0] == tName);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());

            // 1. 準備個人數據
            const memData = {}; 
            mems.forEach(m => memData[m] = { total: 0, cats: {} });

            exps.forEach(r => {
                const twdTotal = parseFloat(r[6]) || 0;
                const rate = twdTotal / (parseFloat(r[4]) || 1); 
                const ms = r[8].split(',');
                
                mems.forEach(m => {
                    if(!ms.includes(m)) return;
                    let amt = 0;
                    if(r[9] === '分攤金額' && r[13].includes('[M:')) {
                        const match = r[13].match(/\[M:(.*?)\]/);
                        if(match) match[1].split('|').forEach(s => { 
                            const [n, v] = s.split(':'); 
                            if(n === m) amt = parseFloat(v) * rate; 
                        });
                    } else { amt = twdTotal / ms.length; }
                    
                    memData[m].total += amt;
                    memData[m].cats[r[2]] = (memData[m].cats[r[2]] || 0) + amt;
                });
            });

            // 2. 渲染個人圓餅圖 (需求 3)
            const container = document.getElementById('pie-container');
            container.innerHTML = "";
            mems.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "chart-container";
                div.innerHTML = `<canvas id="pie-${idx}"></canvas><div class="pie-center"><small>${m}</small><br><b>${Math.round(memData[m].total).toLocaleString()}</b><br><small>TWD</small></div>`;
                container.appendChild(div);
                drawPie(`pie-${idx}`, Object.keys(memData[m].cats), Object.values(memData[m].cats));
            });

            // 3. 渲染類別橫條圖
            const allCats = {};
            exps.forEach(r => { const v = parseFloat(r[6]) || 0; allCats[r[2]] = (allCats[r[2]] || 0) + v; });
            if(charts.anaBar) charts.anaBar.destroy();
            charts.anaBar = new Chart(document.getElementById('anaBar'), {
                type: 'bar',
                data: { labels: Object.keys(allCats), datasets: [{ label: '總支出 (TWD)', data: Object.values(allCats), backgroundColor: Object.keys(allCats).map(c => getCol(c)) }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            // 4. 清算邏輯 (需求 6: 淨額計算)
            let bal = {}; mems.forEach(m => bal[m] = 0);
            exps.forEach(r => {
                const twd = parseFloat(r[6]) || 0;
                const rate = twd / (parseFloat(r[4]) || 1);
                // 付錢的人 (+)
                if(r[13].includes('[P:')) {
                    r[13].match(/\[P:(.*?)\]/)[1].split('|').forEach(s => { 
                        const [n, v] = s.split(':'); if(bal[n] !== undefined) bal[n] += parseFloat(v) * rate; 
                    });
                } else { if(bal[r[7]] !== undefined) bal[r[7]] += twd; }
                // 應攤的人 (-)
                const ms = r[8].split(',');
                if(r[9] === '分攤金額' && r[13].includes('[M:')) {
                    r[13].match(/\[M:(.*?)\]/)[1].split('|').forEach(s => { 
                        const [n, v] = s.split(':'); if(bal[n] !== undefined) bal[n] -= parseFloat(v) * rate; 
                    });
                } else { ms.forEach(m => { if(bal[m] !== undefined) bal[m] -= twd / ms.length; }); }
            });

            let debtors = [], creditors = [];
            Object.entries(bal).forEach(([n, b]) => {
                if (b < -1.5) debtors.push({n, amt: Math.abs(b)});
                else if (b > 1.5) creditors.push({n, amt: b});
            });

            let sHtml = "";
            while(debtors.length > 0 && creditors.length > 0) {
                let d = debtors[0], c = creditors[0], amt = Math.min(d.amt, c.amt);
                sHtml += `<div class="d-flex justify-content-between border-bottom py-2">
                            <span>💸 <b>${d.n}</b> 應支付給 <b>${c.n}</b></span>
                            <span class="text-danger fw-bold">${Math.round(amt).toLocaleString()} TWD</span>
                         </div>`;
                d.amt -= amt; c.amt -= amt;
                if(d.amt <= 1.5) debtors.shift(); if(c.amt <= 1.5) creditors.shift();
            }
            document.getElementById('settle-list').innerHTML = sHtml || "🎉 帳目已兩清！";
        }

        // --- 記帳列表強化 (需求 2) ---
        function updateExpList() {
            const tName = document.getElementById('e_trip').value;
            const trip = db.Trips.find(r => r[0] == tName);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            const data = db.Expenses.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == tName);

            let tableHeader = `<thead><tr><th>日期</th><th>項目</th><th>總計(TWD)</th>`;
            mems.forEach(m => tableHeader += `<th>${m}分攤</th>`);
            tableHeader += `<th>債務關係</th><th>✏️</th></tr></thead>`;

            let tableBody = data.map(o => {
                const r = o.r;
                const twdTotal = parseFloat(r[6]) || 0;
                const rate = twdTotal / (parseFloat(r[4]) || 1);
                const payers = r[7].split(',');
                const splitters = r[8].split(',');
                
                let row = `<tr><td>${r[1].split('-').slice(1).join('/')}</td><td>${r[3]}</td><td>${Math.round(twdTotal)}</td>`;
                
                // 計算每人分攤
                let splitMap = {};
                mems.forEach(m => {
                    let share = 0;
                    if(splitters.includes(m)) {
                        if(r[9] === '分攤金額' && r[13].includes('[M:')) {
                            const match = r[13].match(/\[M:(.*?)\]/);
                            if(match) match[1].split('|').forEach(s => { 
                                const [n, v] = s.split(':'); if(n === m) share = parseFloat(v) * rate; 
                            });
                        } else { share = twdTotal / splitters.length; }
                    }
                    splitMap[m] = share;
                    row += `<td>${Math.round(share)}</td>`;
                });

                // 計算欠款關係 (簡化顯示)
                let oweText = "-";
                if(payers.length === 1 && splitters.length > 0) {
                    const other = splitters.filter(m => m !== payers[0]);
                    if(other.length > 0) {
                        oweText = `${other.join('&')} 欠 ${payers[0]}`;
                    }
                }
                row += `<td><small>${oweText}</small></td><td><span class="edit-btn" onclick="editExp(${o.i})">✏️</span></td></tr>`;
                return row;
            }).join('');

            document.getElementById('exp-list-area').innerHTML = `<table class="table table-sm mt-2">${tableHeader}<tbody>${tableBody}</tbody></table>`;
        }

        // --- 通用工具 ---
        function updateTripList() {
            document.getElementById('trip-list-area').innerHTML = db.Trips.slice(1).map((r, i) => `
                <div class="card p-2 mb-2 d-flex justify-content-between flex-row align-items-center">
                    <div><b>${r[0]}</b><br><small>${r[1]}~${r[2]}</small></div>
                    <div><span class="edit-btn" onclick="editTrip(${i+1})">✏️</span><span class="del-btn" onclick="deleteData('Trips', ${i+1})">🗑️</span></div>
                </div>`).join('');
        }

        function updateExList() {
            const trip = document.getElementById('ex_trip').value;
            const data = db.Exchange.slice(1).map((r, i) => ({r, i: i+1})).filter(o => o.r[0] == trip);
            document.getElementById('ex-list-area').innerHTML = `
                <table class="table table-sm mt-2">
                    <thead><tr><th>日期</th><th>幣別/額</th><th>台幣</th><th>匯率</th><th>備註</th><th></th></tr></thead>
                    <tbody>${data.map(o => `<tr><td>${o.r[1]}</td><td>${o.r[3]}${o.r[5]}</td><td>${o.r[6]}</td><td>${o.r[4]}</td><td>${o.r[7]}</td><td><span class="edit-btn" onclick="editEx(${o.i})">✏️</span><span class="del-btn" onclick="deleteData('Exchange', ${o.i})">🗑️</span></td></tr>`).join('')}</tbody>
                </table>`;
        }

        function syncExpUI() {
            const tName = document.getElementById('e_trip').value;
            const trip = db.Trips.find(r => r[0] == tName);
            if(!trip) return;
            const mems = trip[3].split(',').map(m => m.trim());
            const badge = (cls) => mems.map(m => `<span class="badge-mem ${cls}" onclick="this.classList.toggle('active'); updateSplitUI();">${m}</span>`).join('');
            document.getElementById('p-box').innerHTML = badge('p-b');
            document.getElementById('m-box').innerHTML = badge('m-b');
            let curs = ["TWD"]; 
            db.Exchange.slice(1).forEach(r => { if(r[0] == tName) curs.push(r[3]); });
            document.getElementById('e_cur').innerHTML = [...new Set(curs)].map(c => `<option value="${c}">${c}</option>`).join('');
            updateExpList();
        }

        async function postData(sheet, data, rowIdx) {
            toggleLoader(true);
            const method = rowIdx ? "update" : "append";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({sheet, method, data, rowIdx}) });
            await fetchData();
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function calcExTwd() { document.getElementById('ex_twd_display').innerText = Math.round(parseFloat(document.getElementById('ex_rate').value || 0) * parseFloat(document.getElementById('ex_amt').value || 0)); }
        function calcTwd() {
            const cur = document.getElementById('e_cur').value, amt = parseFloat(document.getElementById('e_amt').value) || 0;
            if(cur === "TWD") document.getElementById('e_twd_val').innerText = amt;
            else {
                const ex = db.Exchange.slice(1).reverse().find(r => r[0] == document.getElementById('e_trip').value && r[3] == cur);
                document.getElementById('e_twd_val').innerText = ex ? Math.round(amt * ex[4]) : "匯率未知";
            }
        }
        function drawPie(id, labels, data) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), { 
                type: 'doughnut', 
                data: { labels, datasets: [{ data, backgroundColor: labels.map(l => getCol(l)) }] }, 
                options: { cutout: '70%', plugins: { legend: { display: false } } } 
            });
        }
        function getCol(c) {
            const colors = { '機票': '#4f6d5a', '交通': '#8c7b6c', '住宿': '#d9c5b2', '飲食(餐)': '#b66a50', '玩樂': '#2d4a3e', '紀念品(食品)': '#e9c46a' };
            return colors[c] || '#' + Math.floor(Math.random()*16777215).toString(16);
        }
    </script>
</body>
</html>
